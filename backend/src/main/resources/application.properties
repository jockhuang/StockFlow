spring.application.name=warehouse-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/warehouse?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=just4you
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info

warehouse.security.seed-admin-username=admin
warehouse.security.seed-admin-password=Admin@123456
